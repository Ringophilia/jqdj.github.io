<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com; script-src 'self'; connect-src https://api.github.com; font-src 'self'">
    <meta name="robots" content="noindex, nofollow">
    <title>管理后台 - 机枪电竞</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="../favicon/favicon.ico">
    <link rel="manifest" href="../favicon/site.webmanifest">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff5f7;
            color: #4a3347;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ffb6c1, #ff85a2);
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 40px 20px;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 8px;
            color: #ff6b8a;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #c9a0b0;
            margin-bottom: 32px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #ffd6e0;
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(255, 133, 162, 0.08);
        }

        .card h2 {
            font-size: 15px;
            color: #ff6b8a;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #9a7a8a;
            margin-bottom: 6px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            background: #fff9fa;
            border: 1px solid #ffd6e0;
            border-radius: 8px;
            color: #4a3347;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #ff85a2;
            box-shadow: 0 0 0 3px rgba(255, 133, 162, 0.1);
        }

        .field {
            margin-bottom: 16px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary {
            background: linear-gradient(135deg, #ff85a2, #ff6b8a);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #e85d75, #d44a62);
            color: #fff;
        }

        .btn-secondary {
            background: #fff0f3;
            border: 1px solid #ffd6e0;
            color: #9a7a8a;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .msg.error {
            background: #fff0f0;
            border: 1px solid #ffccd0;
            color: #d44a62;
            display: block;
        }

        .msg.success {
            background: #f0fff4;
            border: 1px solid #b8e6c8;
            color: #3a9a5c;
            display: block;
        }

        .msg.info {
            background: #fff0f5;
            border: 1px solid #ffd6e0;
            color: #c97090;
            display: block;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #fff9fa;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #ffd6e0;
        }

        .user-info .name {
            font-size: 14px;
            font-weight: 600;
            color: #4a3347;
        }

        .user-info .role {
            font-size: 12px;
            color: #c9a0b0;
        }

        .upload-zone {
            border: 2px dashed #ffd6e0;
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .upload-zone:hover {
            border-color: #ff85a2;
            background: rgba(255, 133, 162, 0.03);
        }

        .upload-zone.dragover {
            border-color: #ff6b8a;
            background: rgba(255, 133, 162, 0.06);
        }

        .upload-zone p {
            color: #c9a0b0;
            font-size: 13px;
            margin-top: 8px;
        }

        .preview-area {
            margin-top: 16px;
            text-align: center;
            display: none;
        }

        .preview-area img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 8px;
            border: 1px solid #ffd6e0;
        }

        .preview-label {
            font-size: 12px;
            color: #c9a0b0;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .current-qr {
            text-align: center;
            margin-bottom: 20px;
        }

        .current-qr img {
            max-width: 160px;
            border-radius: 8px;
            border: 1px solid #ffd6e0;
        }

        .current-qr .label {
            font-size: 12px;
            color: #c9a0b0;
            margin-top: 8px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .actions .btn { flex: 1; }

        .hidden { display: none !important; }

        .session-timer {
            text-align: center;
            font-size: 12px;
            color: #c9a0b0;
            margin-top: 8px;
        }

        .help-text {
            font-size: 12px;
            color: #b89aaa;
            margin-top: 6px;
            line-height: 1.5;
        }

        .footer {
            margin-top: auto;
            padding: 32px 0;
            text-align: center;
            font-size: 12px;
            color: #d4b0c0;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="container">
        <h1>管理后台</h1>
        <p class="subtitle">机枪电竞 - 二维码管理</p>

        <!-- 登录界面 -->
        <div id="login-view">
            <div class="card">
                <h2>管理员登录</h2>
                <div class="field">
                    <label for="token-input">GitHub Personal Access Token</label>
                    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" spellcheck="false">
                    <p class="help-text">需要 repo 权限的 PAT。Token 仅在当前会话中使用，关闭页面后自动清除。</p>
                </div>
                <button class="btn btn-primary" id="login-btn">验证并登录</button>
                <div id="login-msg" class="msg"></div>
            </div>
        </div>

        <!-- 管理界面 -->
        <div id="admin-view" class="hidden">
            <div class="card">
                <div class="user-info" id="user-info"></div>
                <div class="session-timer" id="session-timer"></div>
            </div>

            <div class="card">
                <h2>当前二维码</h2>
                <div class="current-qr" id="current-qr">
                    <p style="color:#c9a0b0; font-size:13px;">加载中...</p>
                </div>
            </div>

            <div class="card">
                <h2>上传新二维码</h2>
                <div class="upload-zone" id="upload-zone">
                    <div>
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ffb6c1" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </div>
                    <p>点击或拖拽上传二维码图片</p>
                    <p>支持 PNG / JPG，最大 2MB</p>
                </div>
                <input type="file" id="file-input" accept="image/png,image/jpeg" class="hidden">

                <div class="preview-area" id="preview-area">
                    <img id="preview-img" alt="预览">
                    <p class="preview-label">新二维码预览</p>
                    <div class="actions">
                        <button class="btn btn-secondary" id="cancel-btn">取消</button>
                        <button class="btn btn-primary" id="upload-btn">确认上传</button>
                    </div>
                </div>

                <div id="upload-msg" class="msg"></div>
            </div>

            <div class="card">
                <button class="btn btn-danger" id="logout-btn">退出登录</button>
            </div>
        </div>
    </div>

    <div class="footer">&copy; 机枪电竞 管理后台</div>

    <script src="admin.js"></script>
</body>
</html>
