<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'; font-src 'self'">
    <title>机枪电竞</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff5f7;
            color: #4a3347;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景装饰层 */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decorations span {
            position: absolute;
            display: block;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        /* 浮动爱心 */
        .heart::before {
            content: '';
            display: block;
            width: var(--size);
            height: var(--size);
            background: var(--color);
            transform: rotate(45deg);
            border-radius: 50% 50% 0 50%;
        }

        /* 浮动星星 */
        .star::before {
            content: '';
            display: block;
            width: var(--size);
            height: var(--size);
            background: var(--color);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        /* 浮动圆点 */
        .dot::before {
            content: '';
            display: block;
            width: var(--size);
            height: var(--size);
            background: var(--color);
            border-radius: 50%;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) rotate(360deg);
            }
        }

        /* 静态背景波点 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle, #ffd6e0 1px, transparent 1px),
                radial-gradient(circle, #ffe4ec 1.5px, transparent 1.5px);
            background-size: 60px 60px, 90px 90px;
            background-position: 0 0, 30px 30px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .top-bar, .container, .footer {
            position: relative;
            z-index: 1;
        }

        .top-bar {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ffb6c1, #ff85a2, #ffb6c1);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-section {
            margin-top: 48px;
            text-align: center;
        }

        .logo-section img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 24px;
            border: 2px solid #ffd6e0;
            box-shadow: 0 4px 20px rgba(255, 133, 162, 0.15);
            animation: logoPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                       logoGlow 3s ease-in-out infinite 0.6s;
        }

        @keyframes logoPop {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 4px 20px rgba(255, 133, 162, 0.15); }
            50% { box-shadow: 0 4px 30px rgba(255, 133, 162, 0.35), 0 0 60px rgba(255, 182, 193, 0.15); }
        }

        .company-name {
            margin-top: 16px;
            font-size: 28px;
            font-weight: 700;
            color: #ff6b8a;
            letter-spacing: 4px;
            animation: fadeInUp 0.6s ease both 0.3s;
        }

        /* 入场动画 */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffb6c1, transparent);
            margin: 32px 0;
            animation: fadeInUp 0.5s ease both 0.5s;
            position: relative;
            overflow: hidden;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 2.5s ease-in-out infinite 1s;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .info-card {
            width: 100%;
            background: #ffffff;
            border: 1px solid #ffd6e0;
            border-radius: 16px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(255, 133, 162, 0.08);
            animation: cardSlideIn 0.5s ease both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-8px) scale(1.06);
            box-shadow: 0 12px 32px rgba(255, 133, 162, 0.22);
        }

        .info-card:nth-child(3) { animation-delay: 0.6s; }
        .info-card:nth-child(4) { animation-delay: 0.8s; }
        .info-card:nth-child(5) { animation-delay: 1.0s; }

        @keyframes cardSlideIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .info-card h2 .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .info-card:hover h2 .icon {
            transform: scale(1.2) rotate(-8deg);
        }

        .contact-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #7a5a6a;
        }

        .contact-item .label {
            color: #c9a0b0;
            min-width: 48px;
            flex-shrink: 0;
        }

        .contact-item .value {
            color: #4a3347;
            word-break: break-all;
        }

        .qr-section {
            text-align: center;
        }

        .qr-wrapper {
            display: inline-block;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            border: 1px solid #ffd6e0;
        }

        .qr-wrapper img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            display: block;
        }

        .qr-hint {
            margin-top: 12px;
            font-size: 12px;
            color: #c9a0b0;
        }

        .footer {
            margin-top: auto;
            padding: 32px 0;
            text-align: center;
            font-size: 12px;
            color: #d4b0c0;
        }

        .placeholder {
            color: #ff85a2;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="bg-decorations" id="bg-deco"></div>
    <div class="top-bar"></div>
    <div class="container">
        <div class="logo-section">
            <img src="logo.webp" alt="机枪电竞 Logo">
            <div class="company-name">机枪电竞</div>
        </div>

        <div class="divider"></div>

        <!-- 俱乐部介绍卡片 - 文案请自行修改 -->
        <div class="info-card">
            <h2>
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                </span>
                关于我们
            </h2>
            <p class="placeholder">请在此处替换为俱乐部介绍文案。</p>
        </div>

        <!-- 联系方式卡片 - 请自行修改 -->
        <div class="info-card">
            <h2>
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </span>
                联系我们
            </h2>
            <ul class="contact-list">
                <li class="contact-item">
                    <span class="label">电话</span>
                    <span class="value placeholder">请替换为联系电话</span>
                </li>
                <li class="contact-item">
                    <span class="label">邮箱</span>
                    <span class="value placeholder">请替换为邮箱地址</span>
                </li>
                <li class="contact-item">
                    <span class="label">微信</span>
                    <span class="value placeholder">请替换为微信号</span>
                </li>
            </ul>
        </div>

        <!-- 微信二维码卡片 -->
        <div class="info-card">
            <h2>
                <span class="icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ff6b8a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h7v7h-7z"/></svg>
                </span>
                微信二维码
            </h2>
            <div class="qr-section">
                <div class="qr-wrapper">
                    <img id="qr-image" src="assets/qrcode.png" alt="微信二维码" onerror="this.parentElement.innerHTML='<div style=\'width:180px;height:180px;display:flex;align-items:center;justify-content:center;color:#c9a0b0;font-size:13px;\'>二维码加载中...</div>'">
                </div>
                <p class="qr-hint">扫描上方二维码添加微信</p>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 机枪电竞 版权所有
    </div>
    <script src="bg.js"></script>
</body>
</html>
